services:
  - type: web
    name: davi-login
    env: node
    plan: free
    buildCommand: "npm install"
    startCommand: "node server.js"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: davi-db
          property: connectionString
      - key: BOT_TOKEN
        sync: false
      - key: CHAT_ID
        sync: false
      - key: NODE_ENV
        value: production

databases:
  - name: davi-db
    plan: free
    databaseName: davi
    user: davi_user
